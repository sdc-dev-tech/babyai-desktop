<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>babyAI — Starting…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafaf8;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #0a0a0a;
      user-select: none;
      -webkit-app-region: drag;
    }
    .logo {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin-bottom: 10px;
    }
    .logo span { color: #f97316; }
    .sub {
      font-size: 0.78rem;
      color: #9a9a94;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .bar {
      width: 180px;
      height: 3px;
      background: #e8e7e2;
      border-radius: 99px;
      overflow: hidden;
    }
    .fill {
      height: 100%;
      width: 30%;
      background: #f97316;
      border-radius: 99px;
      animation: slide 1.6s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(250%); }
      100% { transform: translateX(600%); }
    }
    .status {
      margin-top: 18px;
      font-size: 0.72rem;
      color: #b0b0a8;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
  </style>
</head>
<body>
  <div class="logo">baby<span>AI</span></div>
  <div class="sub">ERP Intelligence</div>
  <div class="bar"><div class="fill"></div></div>
  <div class="status">Starting services…</div>
</body>
</html>
