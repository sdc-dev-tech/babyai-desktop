name: Build & Release Windows Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout desktop repo ──────────────────────────────────────────
      - name: Checkout babyAI-desktop
        uses: actions/checkout@v4

      # ── 2. Checkout frontend (babyAI) ─────────────────────────────────────
      - name: Checkout babyAI frontend
        uses: actions/checkout@v4
        with:
          repository: sdc-dev-tech/babyAI
          token: ${{ secrets.GH_PAT }}
          path: babyAI

      # ── 3. Checkout backend ───────────────────────────────────────────────
      - name: Checkout babyAI-backend
        uses: actions/checkout@v4
        with:
          repository: sdc-dev-tech/babyAI-backend
          token: ${{ secrets.GH_PAT }}
          path: babyAI-backend

      # ── 4. Set up Node for Electron + Next.js ─────────────────────────────
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # ── 5. Set up Python for PyInstaller ──────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 6a. Download portable Node.js binary ─────────────────────────────
      - name: Download portable Node.js
        shell: pwsh
        run: |
          $NODE_VERSION = "20.14.0"
          $URL = "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-win-x64.zip"
          $ZIP = "$env:TEMP\node.zip"
          Write-Host "Downloading Node.js ${NODE_VERSION}..."
          Invoke-WebRequest -Uri $URL -OutFile $ZIP -UseBasicParsing
          Expand-Archive -Path $ZIP -DestinationPath "$env:TEMP\node-extract" -Force
          New-Item -ItemType Directory -Force -Path "vendor\node" | Out-Null
          Copy-Item "$env:TEMP\node-extract\node-v${NODE_VERSION}-win-x64\node.exe" "vendor\node\node.exe" -Force
          Write-Host "Node.js binary ready"

      # ── 6b. Download portable Postgres binaries ───────────────────────────
      - name: Download portable PostgreSQL
        shell: pwsh
        run: |
          $PG_VERSION = "16.2-1"
          $PG_URL     = "https://get.enterprisedb.com/postgresql/postgresql-${PG_VERSION}-windows-x64-binaries.zip"
          $ZIP_PATH   = "$env:TEMP\pg-portable.zip"

          Write-Host "Downloading PostgreSQL ${PG_VERSION}..."
          Invoke-WebRequest -Uri $PG_URL -OutFile $ZIP_PATH -UseBasicParsing

          Write-Host "Extracting..."
          Expand-Archive -Path $ZIP_PATH -DestinationPath "$env:TEMP\pg-extract" -Force

          $PG_SRC = "$env:TEMP\pg-extract\pgsql"
          New-Item -ItemType Directory -Force -Path "vendor\postgres" | Out-Null
          Copy-Item "$PG_SRC\bin"   vendor\postgres -Recurse -Force
          Copy-Item "$PG_SRC\lib"   vendor\postgres -Recurse -Force
          Copy-Item "$PG_SRC\share" vendor\postgres -Recurse -Force
          Write-Host "PostgreSQL ready"

      # ── 7. Build Next.js frontend (standalone) ────────────────────────────
      - name: Build Next.js frontend
        working-directory: babyAI
        shell: pwsh
        env:
          DESKTOP_BUILD: "1"
          NEXT_PUBLIC_API_URL: "http://127.0.0.1:8000"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm install
          npx next build
          Write-Host "--- .next contents ---"
          Get-ChildItem .next -ErrorAction SilentlyContinue | Select-Object Name
          Write-Host "--- checking standalone ---"
          if (Test-Path ".next\standalone") {
            Write-Host "standalone EXISTS"
          } else {
            Write-Host "standalone MISSING — next.config output may not be set"
            exit 1
          }
          # Copy standalone output to vendor/frontend
          New-Item -ItemType Directory -Force -Path "..\vendor\frontend" | Out-Null
          Copy-Item ".next\standalone\*" "..\vendor\frontend" -Recurse -Force
          Copy-Item ".next\static"       "..\vendor\frontend\.next\static" -Recurse -Force
          if (Test-Path "public") {
            Copy-Item "public" "..\vendor\frontend\public" -Recurse -Force
          }
          Write-Host "Frontend built"

      # ── 8. Freeze Python backend with PyInstaller ─────────────────────────
      - name: Freeze Python backend
        shell: pwsh
        run: |
          pip install -r babyAI-backend/requirements.txt
          pip install pyinstaller

          # Copy backend source entirely to C: so all paths stay on one drive
          Copy-Item "$PWD\babyAI-backend" "C:\babyai-src" -Recurse -Force

          # Run from C: with all paths on C:
          Set-Location "C:\babyai-src"
          python -m PyInstaller `
            --onefile `
            --name api `
            --distpath "C:\babyai-dist" `
            --workpath "C:\babyai-work" `
            --specpath "C:\babyai-spec" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import psycopg2 `
            --collect-all fastapi `
            --collect-all starlette `
            --collect-all api `
            "run.py"

          # Copy output back to D: workspace
          New-Item -ItemType Directory -Force -Path "D:\a\babyai-desktop\babyai-desktop\vendor\backend" | Out-Null
          Copy-Item "C:\babyai-dist\api.exe" "D:\a\babyai-desktop\babyai-desktop\vendor\backend\api.exe" -Force
          Write-Host "Backend frozen"

      # ── 9. Install Electron deps & build installer ────────────────────────
      - name: Install Electron dependencies
        run: npm install

      - name: Build Windows installer
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build:win -- --publish never

      # ── 10. Rename exe to fixed name then upload ──────────────────────────
      - name: Rename installer
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist\*.exe | Select-Object -First 1
          Rename-Item $exe.FullName "babyAI-Setup.exe"

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/babyAI-Setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
